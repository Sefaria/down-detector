services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sefaria_status
      POSTGRES_USER: sefaria
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sefaria -d sefaria_status"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Don't count failures while Postgres is still initializing/recovering.
      start_period: 30s

  # Django Web Application (Status Page)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-status.sefaria.org,localhost}
      - DATABASE_URL=postgres://sefaria:${DB_PASSWORD:-changeme}@db:5432/sefaria_status
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-sefaria-down}
      - STATUS_PAGE_URL=${STATUS_PAGE_URL:-https://status.sefaria.org}
    # Only order after the db container has started — do NOT gate on its
    # healthcheck. Gating made `docker compose up` block on health and could
    # fail the whole deploy; instead the entrypoint waits for the DB itself.
    depends_on:
      db:
        condition: service_started
    # Release steps (wait-for-db, migrate, collectstatic, deploy checks) then
    # gunicorn. The web container is the single migrator; see
    # scripts/web-entrypoint.sh.
    command: sh scripts/web-entrypoint.sh

  # Health Check Scheduler (Background Service)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - DATABASE_URL=postgres://sefaria:${DB_PASSWORD:-changeme}@db:5432/sefaria_status
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-sefaria-down}
      - STATUS_PAGE_URL=${STATUS_PAGE_URL:-https://status.sefaria.org}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-60}
    # Order after db and web have started; do NOT gate on either healthcheck
    # (that can make `docker compose up` block and fail the deploy). The
    # scheduler's first check cycle runs one interval (~60s) after start, by
    # which time the web container has migrated and the DB is ready.
    depends_on:
      db:
        condition: service_started
      web:
        condition: service_started
    # This container is not an HTTP server, so the image's HTTP healthcheck
    # (inherited from the Dockerfile) would always report unhealthy. Disable it.
    healthcheck:
      disable: true
    command: python manage.py run_checks

  # Retention Cleanup (Runs daily via cron-like schedule)
  cleanup:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://sefaria:${DB_PASSWORD:-changeme}@db:5432/sefaria_status
    depends_on:
      db:
        condition: service_healthy
    # One-shot maintenance task, not an HTTP server: disable inherited healthcheck.
    healthcheck:
      disable: true
    command: python manage.py cleanup_old_checks
    profiles:
      - maintenance

volumes:
  postgres_data:
