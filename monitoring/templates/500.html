<!DOCTYPE html>
<!--
  Server-error page. Intentionally self-contained: NO template tags, NO static
  files, NO database access — Django's handler500 renders this with an empty
  context, and it must work even when the database or app is unhealthy.
-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong — Sefaria Status</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: #FBFBFA;
            color: #333331;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #00505E, #5698B4, #CCB37C, #5B9370,
                    #823241, #5A4474, #AD4F66, #7285A6, #00807E, #4872B3);
        }
        .box { padding: 2rem; max-width: 32rem; }
        h1 { color: #18345D; font-size: 1.8rem; margin: 0 0 0.75rem; }
        p { font-family: Arial, sans-serif; color: #666664; line-height: 1.6; }
        a { color: #4871BF; }
    </style>
</head>

<body>
    <div class="bar"></div>
    <div class="box">
        <h1>Something went wrong</h1>
        <p>The status page hit an unexpected error. Please try again in a moment.</p>
        <p><a href="/">Reload the status page</a></p>
    </div>
</body>

</html>
